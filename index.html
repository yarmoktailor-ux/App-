<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>خياط اليرموك</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#140b06;
font-family:Tahoma;
color:white;
text-align:center;
}

/* الشعار */

.logo{
margin-top:40px;
}

.logo-box{
width:90px;
height:90px;
background:#c9a33a;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
font-size:40px;
}

h1{
color:#d4af37;
margin:10px 0 5px;
font-size:26px;
}

.subtitle{
color:#c9a33a;
font-size:14px;
margin-bottom:25px;
}

/* الاحصائيات */

.stats{
display:flex;
gap:12px;
padding:0 15px;
margin-bottom:25px;
}

.stat-box{
flex:1;
background:#2b1a12;
border:2px solid #a4612a;
border-radius:20px;
padding:18px 10px;
}

.stat-number{
font-size:28px;
color:#d4af37;
font-weight:bold;
margin-bottom:5px;
}

/* القائمة */

.menu{
padding:0 15px;
}

.menu button{
width:100%;
background:#c9a33a;
border:none;
padding:16px;
margin:8px 0;
border-radius:15px;
font-size:16px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

/* الرسالة */

.info{
margin:25px 15px;
background:#2b1a12;
border:2px solid #a4612a;
border-radius:20px;
padding:18px;
font-size:14px;
color:#ddd;
line-height:1.6;
}

/* الشريط السفلي */

.bottom{
position:fixed;
bottom:0;
width:100%;
background:#1a0f09;
padding:12px;
border-top:1px solid #a4612a;
}

.bottom span{
color:#d4af37;
font-size:18px;
}

</style>
</head>

<body>

<div class="logo">

<div class="logo-box">
✂️
</div>

<h1>خياط اليرموك</h1>

<div class="subtitle">
نظام إدارة الخياطة الحديث
</div>

</div>


<div class="stats">

<div class="stat-box">
<div class="stat-number">0</div>
<div>العملاء</div>
</div>

<div class="stat-box">
<div class="stat-number">0</div>
<div>المقاسات</div>
</div>

</div>


<div class="menu">

<button>
إدارة العملاء
<span>→</span>
</button>

<button>
عميل جديد
<span>+</span>
</button>

<button>
بحث
<span>🔍</span>
</button>

<button>
الإحصائيات
<span>📊</span>
</button>

<button>
الإعدادات
<span>⚙️</span>
</button>

</div>


<div class="info">

مرحبًا بك في تطبيق خياط اليرموك، استخدم القائمة أعلاه للبدء في إدارة عملائك ومقاساتهم.

</div>


<div class="bottom">
<span>🏠 Home</span>
</div>

</body>
</html>

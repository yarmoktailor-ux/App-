<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إطار اليرموك</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0e0703;
    font-family: "Tahoma", sans-serif;
}

/* الصندوق الخارجي */
.frame{
    width:80%;
    max-width:500px;
    min-height:300px;
    background:#2b1a12;
    border:2px solid #b07a3a;
    border-radius:25px;
    padding:40px;
    color:white;
    box-shadow:0 0 20px rgba(0,0,0,0.6);
}

/* نص مؤقت */
.frame h2{
    text-align:center;
    color:#d6a84c;
}

.frame p{
    text-align:center;
    color:#ddd;
}

</style>
</head>

<body>

<div class="frame">

<h2>صفحة فارغة</h2>

<p>
يمكنك إضافة أي محتوى هنا لاحقًا
</p>

</div>

</body>
</html>

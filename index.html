<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>اليرموك للخياطة الرجالية</title>
    <style>
        body {
            /* لون بني محرق داكن */
            background-color: #2D1B10; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fdf5e6;
        }

        .container {
            /* إطار ذهبي نحيف */
            border: 2px solid #D4AF37; 
            padding: 40px;
            text-align: center;
            max-width: 500px;
            background-color: rgba(45, 27, 16, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            color: #D4AF37;
            margin-bottom: 20px;
            font-size: 2.5em;
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
        }

        .logo-placeholder {
            width: 80px;
            height: 80px;
            border: 1px solid #D4AF37;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #D4AF37;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-placeholder">اليرموك</div>
        <h1>فخامة الثوب العربي</h1>
        <p>نختار لكم أجود الأقمشة لتفصيل ثياب رجالية تجمع بين الأصالة والدقة.</p>
    </div>

</body>
</html>
